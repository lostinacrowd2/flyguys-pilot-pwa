<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlyGuys Pilot">
  <title>FlyGuys Pilot</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e;
    }
    
    /* Loading splash shown before iframe loads */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }
    
    #splash .logo {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    #splash .logo svg { width: 48px; height: 48px; }
    
    #splash h1 {
      color: #e2e8f0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    #splash p {
      color: rgba(226,232,240,0.5);
      font-size: 13px;
    }
    
    #splash .spinner {
      margin-top: 32px;
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    /* The main iframe */
    #app-frame {
      width: 100%; height: 100%; border: none;
      position: fixed; inset: 0;
    }
    
    /* Offline banner */
    #offline-banner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      background: #e94560;
      color: white;
      text-align: center;
      padding: 8px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
    #offline-banner.show { display: block; }
  </style>
</head>
<body>

  <div id="splash">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Simple drone icon -->
        <path d="M24 20L8 12M24 20L40 12M24 20V32" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="8" cy="12" r="4" stroke="#e2e8f0" stroke-width="2" fill="none"/>
        <circle cx="40" cy="12" r="4" stroke="#e2e8f0" stroke-width="2" fill="none"/>
        <circle cx="24" cy="32" r="3" fill="#e94560"/>
        <path d="M14 36L24 32L34 36" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>FlyGuys Pilot</h1>
    <p>Loading portal&hellip;</p>
    <div class="spinner"></div>
  </div>

  <div id="offline-banner">You're offline — some features may be unavailable</div>

  <iframe id="app-frame" src="https://pilots.flyguys.com" allow="geolocation; camera; microphone; fullscreen"></iframe>

  <script>
    const splash = document.getElementById('splash');
    const frame = document.getElementById('app-frame');
    const offlineBanner = document.getElementById('offline-banner');

    // Hide splash when iframe loads
    frame.addEventListener('load', () => {
      setTimeout(() => splash.classList.add('hidden'), 600);
    });

    // Fallback: hide splash after 8s even if load event doesn't fire
    setTimeout(() => splash.classList.add('hidden'), 8000);

    // Offline detection
    function updateOnlineStatus() {
      if (!navigator.onLine) {
        offlineBanner.classList.add('show');
      } else {
        offlineBanner.classList.remove('show');
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Register service worker for PWA installability
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then((reg) => console.log('SW registered:', reg.scope))
        .catch((err) => console.warn('SW registration failed:', err));
    }
  </script>
</body>
</html>
